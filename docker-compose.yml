services:
  postgres:
    image: postgres:16-alpine
    container_name: ledger-banking-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: ledger_banking
    ports:
      - "5433:5432"
    volumes:
      - ledger_banking_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d ledger_banking"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  ledger_banking_pgdata:
